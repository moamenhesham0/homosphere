spring.application.name=homosphere-backend

# PostgreSQL connection using environment variables with defaults for development
spring.datasource.url=jdbc:postgresql://${DB_HOMOSPHERE_HOST:localhost}:${DB_HOMOSPHERE_PORT:5432}/${DB_HOMOSPHERE_NAME:homosphere}
spring.datasource.username=${DB_HOMOSPHERE_USERNAME:postgres}
spring.datasource.password=${DB_HOMOSPHERE_PASSWORD:postgres}

spring.datasource.driver-class-name=org.postgresql.Driver
# spring.jpa.hibernate.ddl-auto=update  #only if there is no db script
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port = ${HOMOSPHERE_PORT:8080}


# HikariCP connection pool settings (
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.pool-name=HikariPool


# JWT Configuration
jwt.secret=${HOMOSPHERE_JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970337336763979244226452948404D635166546A576E5A7234753778214125442A472D4B6150645367566B59703373367639792442264529}
jwt.expiration=${HOMOSPHERE_JWT_EXPIRACY:604800000}


# CORS Configuration
# export HOMOSPHERE_CORS_ALLOWED_ORIGINS=https://yourdomain.com,https://www.yourdomain.com
cors.allowed.origins=${HOMOSPHERE_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:4200}


